<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alphabet Championship Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #020617;
    --surface: #0f172a;
    --surface2: #1e293b;
    --green: #22c55e;
    --blue: #38bdf8;
    --purple: #c084fc;
    --orange: #fb923c;
    --red: #ef4444;
    --yellow: #facc15;
    --text: #e2e8f0;
    --muted: #64748b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 16px;
  }

  #app { width: 100%; max-width: 640px; }

  header { text-align: center; margin-bottom: 20px; }
  header h1 { font-family: 'Orbitron', sans-serif; font-size: 16px; letter-spacing: 4px; color: var(--blue); margin-bottom: 4px; }
  header p { font-size: 12px; color: var(--muted); letter-spacing: 1px; }

  .modeBar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .modeBtn {
    padding: 8px 18px; border-radius: 10px; border: 1px solid var(--surface2);
    background: var(--surface); color: var(--muted); cursor: pointer;
    font-weight: 600; font-family: 'Exo 2', sans-serif; font-size: 14px; transition: all .2s;
  }
  .modeBtn:hover:not(.locked) { border-color: var(--blue); color: var(--text); }
  .modeBtn.active { background: var(--surface2); border-color: var(--green); color: var(--green); }
  .modeBtn.locked { opacity: .35; cursor: not-allowed; }

  #gameArea {
    background: var(--surface); border-radius: 16px;
    padding: 28px; text-align: center; border: 1px solid var(--surface2);
    margin-bottom: 14px;
  }
  .indicator { height: 26px; font-size: 13px; font-weight: 700; letter-spacing: 2px; margin-bottom: 6px; }
  .indicator.pos { color: var(--blue); }
  .indicator.pair { color: var(--purple); }
  .indicator.math { color: var(--orange); }

  #q { font-family: 'Orbitron', sans-serif; font-size: 130px; font-weight: 900; line-height: 1; margin: 10px 0; }

  #answer {
    padding: 14px 20px; font-size: 26px; width: 200px; text-align: center;
    border-radius: 12px; border: 2px solid var(--surface2); background: var(--bg);
    color: var(--text); font-family: 'Orbitron', sans-serif; letter-spacing: 4px;
    transition: border-color .2s;
  }
  #answer:focus { outline: none; border-color: var(--blue); }

  .btnRow { display: flex; justify-content: center; gap: 10px; margin-top: 16px; }
  .btn-start {
    padding: 13px 32px; font-size: 16px; cursor: pointer; border-radius: 12px;
    border: none; background: var(--green); color: #000; font-weight: 700;
    font-family: 'Orbitron', sans-serif; letter-spacing: 2px; transition: opacity .2s;
  }
  .btn-start:hover { opacity: .85; }
  .btn-quit {
    padding: 13px 20px; font-size: 14px; cursor: pointer; border-radius: 12px;
    border: none; background: var(--red); color: #fff; font-weight: 700;
    font-family: 'Exo 2', sans-serif;
  }

  .bar { height: 8px; background: var(--surface2); border-radius: 20px; overflow: hidden; margin-top: 16px; }
  .fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--blue), var(--green)); transition: width .3s; }

  .statsGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 14px; }
  .statCard { background: var(--surface2); border-radius: 10px; padding: 10px 8px; text-align: center; }
  .statCard .val { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; color: var(--yellow); }
  .statCard .lbl { font-size: 11px; color: var(--muted); margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }

  #comboDisp { font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--green); font-weight: 900; text-align: center; min-height: 28px; margin-top: 10px; }
  #reportDisp { text-align: center; margin-top: 8px; color: var(--purple); font-weight: 600; min-height: 20px; font-size: 14px; }

  #bestSection { background: var(--surface); border-radius: 16px; padding: 20px; border: 1px solid var(--surface2); }
  #bestSection h3 { font-family: 'Orbitron', sans-serif; font-size: 13px; letter-spacing: 3px; color: var(--yellow); margin-bottom: 14px; }
  .bestGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .bestCard { background: var(--surface2); border-radius: 10px; padding: 12px 8px; text-align: center; }
  .bestCard .val { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 700; color: var(--green); }
  .bestCard .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }
  #noGames { color: var(--muted); font-size: 13px; text-align: center; padding: 10px; }

  .shake { animation: shake .3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 40%{transform:translateX(10px)} 60%{transform:translateX(-8px)} 80%{transform:translateX(6px)} }
  .flashWrong { animation: flashWrong .25s; }
  @keyframes flashWrong { 0%{background:var(--bg)} 50%{background:#3b0a0a} 100%{background:var(--bg)} }
</style>
</head>
<body>
<div id="app">

  <header>
    <h1>ALPHABET CHAMPIONSHIP</h1>
    <p>SESSION ONLY · CLEARS ON REFRESH</p>
  </header>

  <div class="modeBar">
    <button class="modeBtn active" onclick="setMode('pos',this)">🔢 Position</button>
    <button class="modeBtn" onclick="setMode('pair',this)">🔁 Pair</button>
    <button class="modeBtn" onclick="setMode('math',this)">➕ Math</button>
    <button class="modeBtn" onclick="setMode('mixed',this)">🎲 Mixed</button>
  </div>

  <div id="gameArea">
    <div class="indicator" id="indicator"></div>
    <div id="q">—</div>
    <input id="answer" disabled autocomplete="off" placeholder="?"/>
    <div class="btnRow">
      <button class="btn-start" id="startBtn" onclick="startGame()">▶ START</button>
      <button class="btn-quit" id="quitBtn" onclick="quitGame()" style="display:none">✕ QUIT</button>
    </div>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="statsGrid">
      <div class="statCard"><div class="val" id="statScore">0</div><div class="lbl">Score</div></div>
      <div class="statCard"><div class="val" id="statAcc">—</div><div class="lbl">Accuracy</div></div>
      <div class="statCard"><div class="val" id="statFirst">—</div><div class="lbl">1st-Try%</div></div>
      <div class="statCard"><div class="val" id="statRank">—</div><div class="lbl">Rank</div></div>
    </div>
    <div id="comboDisp"></div>
    <div id="reportDisp"></div>
  </div>

  <div id="bestSection">
    <h3>⚡ SESSION BEST</h3>
    <div id="bestContainer"><div id="noGames">Play a game to set your best!</div></div>
  </div>

</div>
<script>
// Session memory — all gone on refresh
let sessionBest = { score: 0, time: null, accuracy: null, firstTry: null, maxCombo: 0, games: 0 };

const AZ = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
let order = [], idx = 0, playing = false, correctAns = "";
let gameMode = "pos";
let totalAttempts = 0, correctFirst = 0, triesCurrent = 0;
let combo = 0, maxCombo = 0, score = 0;
let startTime = 0, letterStart = 0;

function lockModes(lock) {
  document.querySelectorAll('.modeBtn').forEach(b => lock ? b.classList.add('locked') : b.classList.remove('locked'));
}
function setMode(m, el) {
  if (playing) return;
  gameMode = m;
  document.querySelectorAll('.modeBtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}
function shuffle(a) {
  let arr = [...a];
  for (let j = arr.length - 1; j > 0; j--) {
    let k = Math.floor(Math.random() * (j + 1));
    [arr[j], arr[k]] = [arr[k], arr[j]];
  }
  return arr;
}
function pickMode() {
  if (gameMode !== "mixed") return gameMode;
  let r = Math.random();
  return r < 0.33 ? "pos" : r < 0.66 ? "pair" : "math";
}
function showIndicator(m) {
  let el = document.getElementById("indicator");
  el.className = "indicator " + m;
  el.innerText = m === "pos" ? "🔢 POSITION" : m === "pair" ? "🔁 PAIR" : "➕ MATH";
}

function startGame() {
  order = shuffle(AZ); idx = 0; playing = true;
  combo = 0; maxCombo = 0; score = 0;
  totalAttempts = 0; correctFirst = 0;
  lockModes(true);
  document.getElementById("startBtn").style.display = "none";
  document.getElementById("quitBtn").style.display = "inline-block";
  document.getElementById("reportDisp").innerText = "";
  document.getElementById("comboDisp").innerText = "";
  startTime = performance.now();
  let ans = document.getElementById("answer");
  ans.disabled = false; ans.value = ""; ans.focus();
  nextQ();
}

function quitGame() {
  playing = false; lockModes(false);
  document.getElementById("indicator").innerText = "SESSION ENDED";
  document.getElementById("q").innerText = "—";
  document.getElementById("answer").disabled = true;
  document.getElementById("startBtn").style.display = "inline-block";
  document.getElementById("quitBtn").style.display = "none";
  document.getElementById("fill").style.width = "0%";
  document.getElementById("comboDisp").innerText = "";
}

function nextQ() {
  let mode = pickMode();
  showIndicator(mode);
  triesCurrent = 0;
  letterStart = performance.now();
  let L = order[idx];
  let pos = AZ.indexOf(L) + 1;
  if (mode === "pos") { document.getElementById("q").innerText = L; correctAns = String(pos); }
  if (mode === "pair") { document.getElementById("q").innerText = L; correctAns = AZ[26 - pos]; }
  if (mode === "math") {
    let shift = Math.floor(Math.random() * 9) + 1;
    let sign = Math.random() > 0.5 ? 1 : -1, s = shift * sign;
    document.getElementById("q").innerText = `${L} ${s > 0 ? "+" : "−"} ${Math.abs(s)}`;
    let newPos = ((pos + s - 1) % 26 + 26) % 26;
    correctAns = AZ[newPos];
  }
  updateUI();
}

function updateUI() {
  document.getElementById("fill").style.width = (idx / 26 * 100) + "%";
  let acc = totalAttempts ? ((idx / totalAttempts) * 100).toFixed(1) : "100";
  let fAcc = idx ? ((correctFirst / idx) * 100).toFixed(1) : "100";
  let rank = score > 2200 ? "LEGEND" : score > 1700 ? "MASTER" : score > 1200 ? "PRO" : "CADET";
  document.getElementById("statScore").innerText = score;
  document.getElementById("statAcc").innerText = acc + "%";
  document.getElementById("statFirst").innerText = fAcc + "%";
  document.getElementById("statRank").innerText = rank;
  document.getElementById("comboDisp").innerText = combo >= 3 ? `⚡ COMBO ×${combo}` : "";
}

function finish() {
  playing = false; lockModes(false);
  let totalTime = ((performance.now() - startTime) / 1000).toFixed(2);
  let acc = totalAttempts ? ((idx / totalAttempts) * 100).toFixed(1) : "100";
  let fAcc = idx ? ((correctFirst / idx) * 100).toFixed(1) : "100";

  document.getElementById("indicator").innerText = "✅ COMPLETE";
  document.getElementById("reportDisp").innerText = `Max Combo ${maxCombo} · Time ${totalTime}s`;
  document.getElementById("startBtn").style.display = "inline-block";
  document.getElementById("quitBtn").style.display = "none";
  document.getElementById("comboDisp").innerText = `🏁 Final Score: ${score}`;

  sessionBest.games++;
  if (score > sessionBest.score) sessionBest.score = score;
  if (sessionBest.time === null || parseFloat(totalTime) < parseFloat(sessionBest.time)) sessionBest.time = totalTime;
  if (sessionBest.accuracy === null || parseFloat(acc) > parseFloat(sessionBest.accuracy)) sessionBest.accuracy = acc;
  if (sessionBest.firstTry === null || parseFloat(fAcc) > parseFloat(sessionBest.firstTry)) sessionBest.firstTry = fAcc;
  if (maxCombo > sessionBest.maxCombo) sessionBest.maxCombo = maxCombo;

  renderBest();
}

function renderBest() {
  document.getElementById("bestContainer").innerHTML = `
    <div style="font-size:12px;color:var(--muted);text-align:right;margin-bottom:8px">${sessionBest.games} game${sessionBest.games !== 1 ? 's' : ''} this session</div>
    <div class="bestGrid">
      <div class="bestCard"><div class="val">${sessionBest.score}</div><div class="lbl">Best Score</div></div>
      <div class="bestCard"><div class="val">${sessionBest.time}s</div><div class="lbl">Best Time</div></div>
      <div class="bestCard"><div class="val">${sessionBest.maxCombo}×</div><div class="lbl">Best Combo</div></div>
      <div class="bestCard"><div class="val">${sessionBest.accuracy}%</div><div class="lbl">Best Acc</div></div>
      <div class="bestCard"><div class="val">${sessionBest.firstTry}%</div><div class="lbl">Best 1st Try</div></div>
      <div class="bestCard" style="background:transparent;border:1px dashed var(--surface2);display:flex;align-items:center;justify-content:center">
        <div style="font-size:11px;color:var(--muted);line-height:1.6;text-align:center">Resets on<br>page refresh</div>
      </div>
    </div>
  `;
}

document.getElementById("answer").addEventListener("keydown", e => {
  if (e.key !== "Enter" || !playing) return;
  let val = e.target.value.trim().toUpperCase();
  totalAttempts++; triesCurrent++;

  if (val === correctAns) {
    let rt = performance.now() - letterStart;
    if (triesCurrent === 1) correctFirst++;
    let speedBonus = Math.max(0, 1000 - rt);
    score += Math.floor(60 + speedBonus / 18 + combo * 6);
    combo++; maxCombo = Math.max(maxCombo, combo);
    idx++;
    if (idx === 26) { finish(); updateUI(); e.target.value = ""; return; }
    nextQ();
  } else {
    combo = 0;
    document.getElementById("q").classList.add("shake");
    document.body.classList.add("flashWrong");
    setTimeout(() => {
      document.getElementById("q").classList.remove("shake");
      document.body.classList.remove("flashWrong");
    }, 300);
  }
  updateUI();
  e.target.value = "";
});
</script>
</body>
</html>
